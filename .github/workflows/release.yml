name: release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install capnproto
        run: sudo apt-get update && sudo apt-get install -y capnproto
      - name: Parse schema
        run: capnp compile -o- Potentials.capnp > /dev/null
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install build
          python -m build
      - name: Smoke-test wheel
        run: |
          python -m pip install dist/*.whl pycapnp
          python -c "import potentials_schema as ps; m = ps.load(); m.ForceInput.new_message(); print(ps.schema_path())"
          test "$(potentials-schema --schema-id)" = "0xbd1f89fa17369103"
          sudo apt-get install -y pkg-config cmake
          export PKG_CONFIG_PATH="$(potentials-schema --pkgconfig-path)"
          test -f "$(pkg-config --variable=schemafile potentials-schema)"
          mkdir cmake-probe && cd cmake-probe
          printf 'cmake_minimum_required(VERSION 3.24)\nproject(p NONE)\nfind_package(potentials-schema CONFIG REQUIRED)\nmessage(STATUS "schema: ${POTENTIALS_SCHEMA_FILE}")\nif(NOT EXISTS "${POTENTIALS_SCHEMA_FILE}")\n  message(FATAL_ERROR "missing")\nendif()\n' > CMakeLists.txt
          cmake -S . -B build -DCMAKE_PREFIX_PATH="$(potentials-schema --cmake-prefix-path)"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* Potentials.capnp \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
