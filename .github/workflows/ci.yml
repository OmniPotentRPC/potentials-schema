name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install capnproto
        run: sudo apt-get update && sudo apt-get install -y capnproto
      - name: Parse schema
        run: capnp compile -o- Potentials.capnp > /dev/null
