name: release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install capnproto
        run: sudo apt-get update && sudo apt-get install -y capnproto
      - name: Parse schema
        run: capnp compile -o- Potentials.capnp > /dev/null
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install build
          python -m build
      - name: Smoke-test wheel
        run: |
          python -m pip install dist/*.whl pycapnp
          python -c "import potentials_schema as ps; m = ps.load(); m.ForceInput.new_message(); print(ps.schema_path())"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* Potentials.capnp \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
